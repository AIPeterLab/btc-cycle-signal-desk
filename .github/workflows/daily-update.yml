name: Daily BTC Cycle Signal Update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 22 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh BTC cycle signal data
        run: python scripts/update_signals.py

      - name: Commit changed signal data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/signals.json data/signals.csv
          if git diff --cached --quiet; then
            echo "No signal data changes to commit."
          else
            git commit -m "Update BTC cycle signal data"
            git push
          fi
